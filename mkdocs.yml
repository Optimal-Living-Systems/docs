site_name: Optimal Living Systems
site_description: Optimal Living Systems — a nonprofit dedicated to flourishing human communities.
site_author: Optimal Living Systems
site_url: https://optimal-living-systems.github.io/ols-mcdocs/
repo_url: https://github.com/Optimal-Living-Systems/ols-mcdocs
repo_name: Optimal-Living-Systems/ols-mcdocs
edit_uri: edit/main/docs/

copyright: Copyright &copy; Optimal Living Systems

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - redirects:
      redirect_maps: {}
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - social

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Optimal-Living-Systems
  generator: false

nav:
  - Home: index.md
  - About: about.md
  - Programs: programs.md
  - Research: research.md
  - Get Involved: get-involved.md
  - Donate: donate.md
  - Contact: contact.md
